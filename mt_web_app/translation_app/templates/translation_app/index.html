<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali to Hindi Translation</title>
    <style>
        body { font-family: "Inter", sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .input-group { margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; resize: none; box-sizing: border-box;}
        button { background-color: #3498db; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; display: block; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 20px; padding: 20px; background-color: #e8f4f8; border-radius: 8px; border-left: 5px solid #3498db; display: none; }
        .result-text { font-size: 18px; color: #333; margin-bottom: 10px; }
        .meta-info { font-size: 14px; color: #7f8c8d; }
        .loading { text-align: center; display: none; color: #7f8c8d; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bengali to Hindi Translation</h1>
        <p style="text-align:center; color:#7f8c8d;">Powered by NLLB, IndicTrans2 & COMET-Kiwi Ensemble</p>
        <div class="input-group">
            <textarea id="sourceText" placeholder="Enter Bengali text here..."></textarea>
        </div>
        <button id="translateBtn" onclick="translateText()">Translate</button>
        <div class="loading" id="loadingSpinner">Processing translation... (Takes a moment on first run)</div>
        <div class="result-box" id="resultBox">
            <div class="result-text" id="translatedText"></div>
            <div class="meta-info">Model Selected: <strong id="modelUsed"></strong> | COMET-Kiwi Score: <strong id="cometScore"></strong></div>
        </div>
    </div>
    <script>
        function translateText() {
            const text = document.getElementById("sourceText").value;
            if (!text) return;
            document.getElementById("translateBtn").disabled = true;
            document.getElementById("loadingSpinner").style.display = "block";
            document.getElementById("resultBox").style.display = "none";
            const formData = new FormData();
            formData.append("text", text);
            fetch("/translate/", { method: "POST", body: formData })
            .then(response => response.json())
            .then(data => {
                document.getElementById("translateBtn").disabled = false;
                document.getElementById("loadingSpinner").style.display = "none";
                if (data.error) { alert("Error: " + data.error); }
                else {
                    document.getElementById("translatedText").innerText = data.translation;
                    document.getElementById("modelUsed").innerText = data.model_used;
                    document.getElementById("cometScore").innerText = data.comet_score.toFixed(4);
                    document.getElementById("resultBox").style.display = "block";
                }
            })
            .catch(error => {
                document.getElementById("translateBtn").disabled = false;
                document.getElementById("loadingSpinner").style.display = "none";
                alert("Translation failed. Check server logs.");
            });
        }
    </script>
</body>
</html>
